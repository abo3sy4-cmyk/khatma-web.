<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | نظام الختمة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="#">⚙️ لوحة الإدارة</a>
            <div>
                <a href="index.html" class="btn btn-outline-light btn-sm">العودة للرئيسية</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            
            <!-- قسم شريط الأخبار -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0 border-top border-warning border-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">📰 شريط الأخبار</h5>
                        <input type="text" id="newsInput" class="form-control mb-3" placeholder="اكتب الخبر هنا...">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="newsSwitch">
                            <label class="form-check-label">تفعيل الشريط</label>
                        </div>
                        <button id="saveNewsBtn" class="btn btn-warning w-100">حفظ الإعدادات</button>
                    </div>
                </div>
            </div>

            <!-- قسم إضافة ختمة -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0 border-top border-success border-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">📖 إضافة ختمة جديدة</h5>
                        <input type="text" id="khatmaTitleInput" class="form-control mb-3" placeholder="اسم الختمة (مثال: ختمة رمضان)">
                        <button id="addKhatmaBtn" class="btn btn-success w-100">إنشاء (30 جزء)</button>
                    </div>
                </div>
            </div>

            <!-- قسم طلبات الحجز -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0 border-top border-primary border-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">🔔 طلبات الحجز المعلقة</h5>
                        <div id="requestsContainer">
                            <p class="text-muted small">لا توجد طلبات حالياً...</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
