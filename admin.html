<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | نظام الختمة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #721c24;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-cogs me-2"></i>لوحة الإدارة</a>
            <div><a href="index.html" class="btn btn-outline-light btn-sm fw-bold">العودة للرئيسية</a></div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            
            <div class="col-md-4 mb-4">
                <div class="card shadow rounded-4 border-0 border-top border-warning border-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3 fw-bold"><i class="fas fa-newspaper text-warning me-2"></i>شريط الأخبار</h5>
                        <input type="text" id="newsInput" class="form-control mb-3" placeholder="اكتب الخبر هنا...">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="newsSwitch">
                            <label class="form-check-label">تفعيل الشريط</label>
                        </div>
                        <button id="saveNewsBtn" class="btn btn-warning w-100 fw-bold">حفظ الإعدادات</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card shadow rounded-4 border-0 border-top border-success border-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3 fw-bold"><i class="fas fa-plus-circle text-success me-2"></i>إضافة ختمة</h5>
                        <input type="text" id="khatmaTitleInput" class="form-control mb-3" placeholder="اسم الختمة (مثال: ختمة رمضان)">
                        <button id="addKhatmaBtn" class="btn btn-success w-100 fw-bold">إنشاء (30 جزء)</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card shadow rounded-4 border-0 border-top border-primary border-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3 fw-bold"><i class="fas fa-bell text-primary me-2"></i>طلبات الحجز</h5>
                        <div id="requestsContainer"><p class="text-muted small text-center mt-3">لا توجد طلبات حالياً</p></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
